<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Local Finance App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💰 My Local Finance App</h1>
    
    <div class="form-group">
      <input type="text" id="desc-input" placeholder="What did you buy? (e.g., Coffee)" />
      <input type="number" id="amount-input" placeholder="Amount (e.g., 5.50)" step="0.01" />
      <button id="add-btn">Add Transaction</button>
    </div>

    <ul id="transaction-list">
      </ul>
    
    <div class="controls">
      <button id="export-btn">Export Data</button>
      <button id="import-btn">Import Data</button>
      <input type="file" id="import-file" style="display:none;" />
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
